<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SVGA Player</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svgaplayerweb@2.3.1/build/svga.min.js"></script>
    <style>
        html, body, #canvas-container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <script>
        function playSvga(url, loops) {
            const container = document.getElementById('canvas-container');
            const playerDiv = document.createElement('div');
            playerDiv.style.width = '100%';
            playerDiv.style.height = '100%';
            container.innerHTML = '';
            container.appendChild(playerDiv);

            const parser = new SVGA.Parser(playerDiv);
            const player = new SVGA.Player(playerDiv);
            player.clearsAfterStop = true;
            player.loops = loops === true ? 0 : 1;
            parser.load(url, function(videoItem) {
                player.setVideoItem(videoItem);
                player.startAnimation();
            }, function(error) {
                console.error('SVGA Error:', error);
            });
        }
    </script>
</body>
</html>
