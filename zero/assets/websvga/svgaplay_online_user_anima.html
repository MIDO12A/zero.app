<html>

<body>
<div>
    <!--长宽不能大于 R.layout.room_online_usericon中的ConstraintLayout长宽 -->
    <div id="testCanvas" style="width: 35px; height: 35px;"></div>
    <!-- <canvas id="testCanvas" width="500" height="500" style="background-color: #000000; "></canvas> -->
</div>


<script src="./jquery-3.6.0.min.js"></script>
<script src="./svga.min.js"></script>

<script>

     $(function(){
            playWithSvgaWeb()
     });

     function playWithSvgaWeb(){
            var parser = new SVGA.Parser('#testCanvas');
            //alert(parser);
            var player = new SVGA.Player('#testCanvas');
            //alert(player);
            player.clearsAfterStop=true;
            player.loops=1000; //循环1000次
            parser.load("../svga/恋爱星球fm_cap_silver头像勋章.svga", function (videoItem) {
               player.setVideoItem(videoItem);
               player.startAnimation();
            }, function (error) {
               alert(error.message);
          })

       //svga播放结束时的回调
       player.onFinished(() => {
              player.clearDynamicObjects();
              player.clear();
       });

   }


    </script>
</body>

</html>
